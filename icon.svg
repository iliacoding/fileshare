<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Beam — cloud file share">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6f9aff"/>
      <stop offset="1" stop-color="#4a78fb"/>
    </linearGradient>
    <!-- Everything inside the cloud is punched out so the blue shows through,
         which reads as a single clean cut-out arrow. -->
    <mask id="cut">
      <rect width="512" height="512" fill="black"/>
      <g fill="white">
        <rect x="150" y="252" width="212" height="72" rx="36"/>
        <circle cx="198" cy="268" r="54"/>
        <circle cx="256" cy="232" r="66"/>
        <circle cx="316" cy="270" r="52"/>
      </g>
      <!-- the arrow, in black, subtracts from the white cloud -->
      <path d="M256 206 L314 266 L281 266 L281 316 L231 316 L231 266 L198 266 Z" fill="black"/>
    </mask>
  </defs>

  <!-- Full-bleed background: iOS masks the corners, Android uses the safe zone. -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- White cloud with the arrow cut out of it. -->
  <rect width="512" height="512" fill="#ffffff" mask="url(#cut)"/>
</svg>
